# sonar-project.properties
# Place this file at the root of your source code repo

sonar.projectKey=zoumana001
sonar.projectName=Zoum Boutique Frontend
sonar.organization=zoumana001
# sonar.projectVersion=1.0

# Source code location
sonar.sources=src/frontend
sonar.exclusions=**/*_test.go,**/vendor/**,**/node_modules/**

# Language-specific settings
sonar.go.coverage.reportPaths=src/frontend/coverage.out

# Test file patterns
sonar.test.inclusions=**/*_test.go

# Quality Gate — pipeline fails if any of these thresholds are breached
# These are set in your SonarQube server UI, not here.
# But document your targets:
#   Coverage       >= 70%
#   Duplications   <= 3%
#   Maintainability rating = A
#   Reliability rating     = A
#   Security rating        = A
#   Security hotspots reviewed = 100%

# Encoding
sonar.sourceEncoding=UTF-8
