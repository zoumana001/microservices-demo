# ─────────────────────────────────────────────
# deployment.yaml — Online Boutique frontend
# ArgoCD manages this file.
# The CI pipeline updates the image tag line
# automatically on every successful build.
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: boutique-app
  labels:
    app: frontend
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: boutique-sa

      # Pod-level security — applies to all containers
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: frontend
          # ↓ CI pipeline updates this line automatically via sed
          image: ghcr.io/your-github-username/boutique-frontend:latest

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Resource limits — prevents one pod starving the node
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          # Liveness probe — if this fails, K8s restarts the container
          livenessProbe:
            httpGet:
              path: /_healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          # Readiness probe — pod only receives traffic when this passes
          readinessProbe:
            httpGet:
              path: /_healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

          # Container-level security hardening
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # Environment variables — microservice addresses
          # These match the service names defined in service.yaml
          env:
            - name: PORT
              value: "8080"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice:3550"
            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice:7000"
            - name: CART_SERVICE_ADDR
              value: "cartservice:7070"
            - name: RECOMMENDATION_SERVICE_ADDR
              value: "recommendationservice:8080"
            - name: SHIPPING_SERVICE_ADDR
              value: "shippingservice:50051"
            - name: CHECKOUT_SERVICE_ADDR
              value: "checkoutservice:5050"
            - name: AD_SERVICE_ADDR
              value: "adservice:9555"
            - name: ENABLE_PROFILER
              value: "0"

          # Writable temp dir — needed because readOnlyRootFilesystem=true
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      # Spread pods across availability zones for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: frontend

---
# ServiceAccount for the frontend pod
# IRSA annotation will be added here in Phase 4 if needed
apiVersion: v1
kind: ServiceAccount
metadata:
  name: boutique-sa
  namespace: boutique-app

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: boutique-app
  labels:
    app: boutique
    managed-by: argocd