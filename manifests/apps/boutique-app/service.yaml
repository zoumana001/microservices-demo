# ─────────────────────────────────────────────
# service.yaml — Online Boutique
# Defines K8s Services for every microservice.
# Services give each microservice a stable DNS
# name inside the cluster so pods can find each
# other by name (e.g. "cartservice:7070").
# ─────────────────────────────────────────────

# ── Frontend ────────────────────────────────
# ClusterIP — internal only.
# The Gateway (Phase 4) routes external traffic
# to this service via HTTPRoute.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: boutique-app
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080

---
# ── Cart service ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: cartservice
  namespace: boutique-app
spec:
  type: ClusterIP
  selector:
    app: cartservice
  ports:
    - name: grpc
      port: 7070
      targetPort: 7070

---
